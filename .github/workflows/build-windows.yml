name: Build Wisp for Windows

on:
  push:
    tags:
      - 'v*'          # Only on new tags: v0.1.0, v1.2.3, etc.
  workflow_dispatch:      # Allow manual trigger from Actions tab

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest    # GitHub-hosted Windows Server 2022

    steps:
      # ── Checkout ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python setup ───────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Install PyInstaller ─────────────────────────────────────
      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      # ── Install core dependencies (skip heavy ML libs) ─────────
      # sentence-transformers / torch / tensorflow are NOT needed
      # for the CLI build — they are server-side only.
      - name: Install Wisp core dependencies
        run: |
          pip install -r requirements-windows.txt

      # ── Verify hooks exist ─────────────────────────────────────
      - name: List PyInstaller hooks
        run: |
          echo === hooks/ ===
          if exist hooks\hook-asyncpg.py (echo OK: hooks found) else (echo MISSING: hooks not found)
          dir hooks /b
          echo === wisp.spec ===
          if exist wisp.spec (echo OK) else (echo MISSING)
          echo === src/main.py ===
          if exist src\main.py (echo OK) else (echo MISSING)
        shell: cmd

      # ── Build with PyInstaller ─────────────────────────────────
      - name: Build with PyInstaller
        run: |
          pyinstaller wisp.spec --clean --noconfirm
        shell: cmd

      # ── Smoke test ─────────────────────────────────────────────
      - name: Test executable (smoke test)
        run: |
          if (!(Test-Path dist\wisp.exe)) {
            Write-Host "ERROR: wisp.exe not found at dist\wisp.exe"
            Get-ChildItem dist -Recurse -Name
            exit 1
          }
          Write-Host "wisp.exe found"
          $size = (Get-Item dist\wisp.exe).Length
          Write-Host "Size: $size bytes"
          Write-Host ""
          Write-Host "Running --version..."
          dist\wisp.exe --version
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: --version failed"
            exit 1
          }
          Write-Host "SUCCESS"

      # ── Upload artifact ─────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wisp-windows-x64-${{ github.ref_name }}
          path: dist/wisp.exe
          retention-days: 30

      # ── Create Release on tag ───────────────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/wisp.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
