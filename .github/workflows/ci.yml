name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Build proprietary .so modules
        run: |
          uv run pip install cython
          uv run python scripts/compile_proprietary.py build

      - name: Run ruff (lint)
        run: uv run ruff check src/

      - name: Run mypy (type check)
        run: uv run mypy src/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: wisp_test
          POSTGRES_USER: wisp
          POSTGRES_PASSWORD: wisp
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Build proprietary .so modules
        run: |
          uv run pip install cython
          uv run python scripts/compile_proprietary.py build

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://wisp:wisp@localhost:5432/wisp_test
        run: |
          # Create extensions and run migrations
          PGPASSWORD=wisp psql -h localhost -U wisp -d wisp_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;" || true
          uv run alembic upgrade head || true

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://wisp:wisp@localhost:5432/wisp_test
          REDIS_URL: redis://localhost:6379
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY || 'test-key' }}
        run: uv run pytest tests/ -v --tb=short

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: wisp/wisp

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}-worker
          cache-from: type=gha
          cache-to: type=gha,mode=max
